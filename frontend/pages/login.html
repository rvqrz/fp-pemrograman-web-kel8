<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../assets/css/output.css">

  <title>Login</title>
</head>

<body class="bg-slate-950 flex items-center justify-center h-screen">

  <div class="bg-slate-900 p-10 rounded-2xl w-96">

    <h1 class="text-3xl font-bold text-white mb-8">
      Login
    </h1>

    <form id="loginForm" class="space-y-5">

      <input
        type="text"
        id="username"
        placeholder="Username"
        class="w-full p-3 rounded-xl bg-slate-800 text-white outline-none">

      <input
        type="password"
        id="password"
        placeholder="Password"
        class="w-full p-3 rounded-xl bg-slate-800 text-white outline-none">

      <button
        class="w-full bg-indigo-500 p-3 rounded-xl font-bold">
        Login
      </button>

    </form>

  </div>

  <script src="../assets/js/login.js"></script>

</body>

</html>
