<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Warehouse Management</title>

    <link
        rel="stylesheet"
        href="../assets/css/output.css">

</head>

<body class="bg-slate-950 text-white p-10">

    <h1 class="text-4xl font-bold mb-8">
        Lokasi Gudang
    </h1>

    <div class="bg-slate-900 p-6 rounded-2xl mb-8">

        <form
            id="warehouseForm"
            class="space-y-4">

            <input
                type="text"
                id="name"
                placeholder="Nama Gudang"
                class="w-full bg-slate-800 p-4 rounded-xl">

            <input
                type="text"
                id="location"
                placeholder="Lokasi Gudang"
                class="w-full bg-slate-800 p-4 rounded-xl">

            <button
                class="bg-blue-500 px-6 py-3 rounded-xl">

                Simpan

            </button>

        </form>

    </div>

    <div class="bg-slate-900 p-6 rounded-2xl">

        <table class="w-full">

            <thead>

                <tr
                    class="border-b border-slate-700">

                    <th class="text-left p-4">
                        ID
                    </th>

                    <th class="text-left p-4">
                        Nama Gudang
                    </th>

                    <th class="text-left p-4">
                        Lokasi
                    </th>

                </tr>

            </thead>

            <tbody id="warehouseTable">

            </tbody>

        </table>

    </div>

    <script src="../assets/js/warehouse.js"></script>

</body>

</html>
