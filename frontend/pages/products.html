<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../assets/css/output.css">

  <title>Products</title>
</head>

<body class="bg-slate-950 text-white p-10">

  <h1 class="text-3xl font-bold mb-8">
    Data Barang
  </h1>

  <div class="bg-slate-900 p-6 rounded-2xl mb-8">

  <h2 class="text-2xl font-bold mb-6">
    Tambah Barang
  </h2>

  <form id="productForm" class="grid grid-cols-3 gap-4">

    <input
      type="text"
      id="name"
      placeholder="Nama Barang"
      class="bg-slate-800 p-3 rounded-xl outline-none">

    <select
  id="category_id"
  class="bg-slate-800 p-3 rounded-xl outline-none">

  <option value="">
    Pilih Kategori
  </option>

</select>

    <input
      type="text"
      id="unit"
      placeholder="Unit"
      class="bg-slate-800 p-3 rounded-xl outline-none">

    <button
      class="bg-indigo-500 p-3 rounded-xl col-span-3">
      Tambah Barang
    </button>

  </form>

</div>

  <table class="w-full">

    <thead>

      <tr class="bg-slate-900">

        <th class="p-4 text-left">ID</th>
        <th class="p-4 text-left">Nama</th>
        <th class="p-4 text-left">Kategori</th>
        <th class="p-4 text-left">Unit</th>
        <th class="p-4 text-left">Action</th>

      </tr>

    </thead>

    <tbody id="productTable">

    </tbody>

  </table>

  <script src="../assets/js/products.js"></script>

</body>

</html>
